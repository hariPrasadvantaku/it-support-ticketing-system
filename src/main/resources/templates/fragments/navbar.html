<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
	 
	
<body>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<nav th:fragment="navbar"
		class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">

			<a class="navbar-brand" th:href="@{/}">IT Support</a>

			<!-- ✅ MOBILE TOGGLER -->
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>

			<!-- ✅ COLLAPSIBLE CONTENT -->
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav me-auto">

					<li class="nav-item" sec:authorize="hasRole('USER')"><a
						class="nav-link" href="/user/dashboard">Dashboard</a></li>

					<li class="nav-item" sec:authorize="hasRole('SUPPORT')"><a
						class="nav-link" href="/support/dashboard">Dashboard</a></li>

					<li class="nav-item" sec:authorize="hasRole('ADMIN')"><a
						class="nav-link" href="/admin/dashboard">Dashboard</a></li>

					<li class="nav-item" sec:authorize="hasRole('ADMIN')"><a
						class="nav-link" href="/admin/users">Users</a></li>

				</ul>

				<a class="btn btn-warning me-2" href="/change-password"> Change
					Password </a> <a class="btn btn-danger" href="/logout"> Logout </a>
			</div>
		</div>
	</nav>

</body>
</html>
