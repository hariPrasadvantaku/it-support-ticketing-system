<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Signup</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">
	<nav class="navbar navbar-dark bg-dark px-3">
		<span><a class="navbar-brand">IT Support</a></span>
	</nav>
	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-5">
				<div class="card shadow p-4">
					<h3 class="text-center mb-3">Create Account</h3>

					<form th:action="@{/signup}" method="post">

						<div class="mb-3">
							<label>Username</label> <input type="text" name="username"
								class="form-control" required>
						</div>

						<div class="mb-3">
							<label>Email</label> <input type="email" name="email"
								class="form-control" th:value="${user.email}">
							<div class="text-danger" th:if="${#fields.hasErrors('email')}"
								th:errors="*{email}"></div>
						</div>

						<div class="mb-3">
							<label>Password</label> <input type="password" name="password"
								class="form-control">
							<div class="text-danger" th:if="${#fields.hasErrors('password')}"
								th:errors="*{password}"></div>
						</div>

						<button class="btn btn-success w-100">Register</button>

						<div class="text-center mt-3">
							<a th:href="@{/login}">Back to Login</a>
						</div>

					</form>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
